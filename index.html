<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rummikub</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rummikub">
<meta name="theme-color" content="#1c1c1e">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f7;
    --color-background-tertiary: #ebebeb;
    --color-text-primary: #1c1c1e;
    --color-text-secondary: #6e6e73;
    --color-text-tertiary: #aeaeb2;
    --color-accent: #007aff;
    --color-danger: #ff3b30;
    --color-border-tertiary: #d1d1d6;
    --color-border-primary: #007aff;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1e;
      --color-background-secondary: #2c2c2e;
      --color-background-tertiary: #3a3a3c;
      --color-text-primary: #f2f2f7;
      --color-text-secondary: #aeaeb2;
      --color-text-tertiary: #636366;
      --color-border-tertiary: #38383a;
      --color-border-primary: #0a84ff;
      --color-accent: #0a84ff;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    padding: env(safe-area-inset-top,12px) env(safe-area-inset-right,12px) env(safe-area-inset-bottom,12px) env(safe-area-inset-left,12px);
    min-height: 100dvh;
  }
  .wrap { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--color-background-primary);
    border: none; border-radius: 50%; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--color-accent); cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }

  /* Timer */
  .timer-bar {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .timer-btn {
    background: var(--color-background-secondary);
    border: none; border-radius: var(--border-radius-md);
    padding: 6px 12px; display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 500; color: var(--color-accent); cursor: pointer;
  }
  .timer-display {
    flex: 1; text-align: center;
    font-size: 26px; font-weight: 600; font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .timer-display.urgent { color: var(--color-danger); }

  /* Date row */
  .date-row {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    padding: 10px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  #weekLabel {
    width: 100%; border: none; background: transparent;
    font-size: 15px; color: var(--color-text-primary);
    text-align: center;
  }
  #weekLabel:focus { outline: none; }

  /* Score grid */
  .card {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .grid { display: grid; grid-template-columns: repeat(4,1fr); }
  .player-col { border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; }
  .player-col:last-child { border-right: none; }
  .player-header {
    padding: 8px 4px 6px;
    text-align: center;
    font-size: 13px; font-weight: 600;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    display: flex; flex-direction: column; gap: 2px;
  }
  .player-name-display { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
  .rounds-col { padding: 6px; display: flex; flex-direction: column; gap: 4px; }
  .round-row { display: flex; flex-direction: column; gap: 2px; }
  .round-label { font-size: 10px; color: var(--color-text-tertiary); text-align: center; line-height: 1; }
  .score-input {
    width: 100%; text-align: center;
    font-size: 15px; font-weight: 500;
    padding: 5px 2px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  .score-input:focus { outline: none; border-color: var(--color-border-primary); }
  .total-row { border-top: 0.5px solid var(--color-border-tertiary); padding: 8px 6px; text-align: center; }
  .total-label { font-size: 10px; color: var(--color-text-secondary); }
  .total-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .crown-area { text-align: center; font-size: 22px; min-height: 28px; line-height: 1; padding: 4px 0 6px; }

  .reset-row { display: flex; justify-content: center; margin-top: 4px; }

  /* History */
  .section-title { font-size: 13px; font-weight: 600; color: var(--color-text-secondary); padding: 0 2px 4px; letter-spacing: 0.3px; text-transform: uppercase; }
  .history-card { background: var(--color-background-primary); border-radius: var(--border-radius-lg); overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .history-item { padding: 10px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .history-scores { display: flex; gap: 10px; flex-wrap: wrap; }
  .history-score { font-size: 13px; }
  .history-score.winner { font-weight: 700; color: var(--color-accent); }
  .empty-history { padding: 20px 14px; text-align: center; font-size: 14px; color: var(--color-text-tertiary); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  .stat-card { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stat-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .stat-wins { font-size: 22px; font-weight: 700; color: var(--color-accent); }
  .stat-avg { font-size: 12px; color: var(--color-text-secondary); }

  /* ── Namen-Overlay ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .overlay-sheet {
    background: var(--color-background-primary);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
    display: flex; flex-direction: column; gap: 14px;
  }
  .overlay-title { font-size: 17px; font-weight: 700; text-align: center; }
  .name-fields { display: flex; flex-direction: column; gap: 10px; }
  .name-row { display: flex; align-items: center; gap: 10px; }
  .name-row label { font-size: 13px; color: var(--color-text-secondary); width: 60px; text-align: right; }
  .name-row input {
    flex: 1;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    font-size: 15px;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }
  .name-row input:focus { outline: none; border-color: var(--color-border-primary); }
  .btn-primary {
    background: var(--color-accent);
    color: #fff; border: none;
    border-radius: var(--border-radius-md);
    padding: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; width: 100%;
  }
  .btn-secondary {
    background: var(--color-background-secondary);
    color: var(--color-text-primary); border: none;
    border-radius: var(--border-radius-md);
    padding: 10px; font-size: 15px;
    cursor: pointer; width: 100%;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🎯 Rummikub</h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="openNamenOverlay()" title="Spielernamen bearbeiten">
        <i class="ti ti-users"></i>
      </button>
    </div>
  </div>

  <div class="timer-bar">
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">
      <i class="ti ti-player-play" id="timerIcon"></i>
      <span id="timerLabel">Start</span>
    </button>
    <div class="timer-display" id="timerDisplay">1:00</div>
    <button class="timer-btn" onclick="resetTimer()">
      <i class="ti ti-refresh"></i>
    </button>
  </div>

  <div class="date-row">
    <input type="text" id="weekLabel" />
  </div>

  <div class="card">
    <div class="grid" id="grid"></div>
  </div>

  <div class="reset-row">
    <button class="timer-btn" onclick="resetAll()" style="color:var(--color-text-secondary);font-size:13px;">
      <i class="ti ti-trash"></i> Neues Spiel
    </button>
    <button class="timer-btn" onclick="saveGame()" style="color:var(--color-accent);font-size:13px;margin-left:8px;">
      <i class="ti ti-device-floppy"></i> Speichern
    </button>
  </div>

  <div>
    <div class="section-title">Statistik</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <div>
    <div class="section-title">Verlauf</div>
    <div class="history-card" id="historyList"></div>
  </div>
</div>

<!-- Namen-Overlay -->
<div class="overlay" id="namenOverlay" onclick="closeOverlayIfBg(event)">
  <div class="overlay-sheet">
    <div class="overlay-title">Spielernamen</div>
    <div class="name-fields" id="nameFields"></div>
    <button class="btn-primary" onclick="saveNames()">Übernehmen</button>
    <button class="btn-secondary" onclick="closeNamenOverlay()">Abbrechen</button>
  </div>
</div>

<script>
const ROUNDS = 10;
const DEFAULT_NAMES = ['Oma', 'Elke', 'Opa', 'Mario'];

let players = loadNames();
let scores = Array.from({length:4}, () => Array(ROUNDS).fill(''));
let timerSec = 60, timerRunning = false, timerInterval = null;

function loadNames() {
  try {
    const saved = localStorage.getItem('rummikub_names');
    if (saved) {
      const arr = JSON.parse(saved);
      if (Array.isArray(arr) && arr.length === 4) return arr;
    }
  } catch(e) {}
  return [...DEFAULT_NAMES];
}

function saveNamesToStorage(names) {
  localStorage.setItem('rummikub_names', JSON.stringify(names));
}

// ── Grid ──────────────────────────────────────────────
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  players.forEach((name, pi) => {
    const col = document.createElement('div');
    col.className = 'player-col';
    col.innerHTML = `<div class="player-header">
      <div class="player-name-display" title="${name}">${name}</div>
    </div>`;
    const rounds = document.createElement('div');
    rounds.className = 'rounds-col';
    for (let r = 0; r < ROUNDS; r++) {
      const row = document.createElement('div');
      row.className = 'round-row';
      row.innerHTML = `<div class="round-label">R${r+1}</div>
        <input class="score-input" type="number" inputmode="numeric"
          value="${scores[pi][r]}"
          onchange="scores[${pi}][${r}]=this.value; updateTotals()">`;
      rounds.appendChild(row);
    }
    col.appendChild(rounds);

    const tot = document.createElement('div');
    tot.className = 'total-row';
    tot.innerHTML = `<div class="total-label">Total</div>
      <div class="total-value" id="total_${pi}">0</div>`;
    col.appendChild(tot);

    const crown = document.createElement('div');
    crown.className = 'crown-area';
    crown.id = `crown_${pi}`;
    col.appendChild(crown);

    g.appendChild(col);
  });
  updateTotals();
}

function updateTotals() {
  const totals = players.map((_, pi) =>
    scores[pi].reduce((s, v) => s + (parseInt(v) || 0), 0)
  );
  const max = Math.max(...totals);
  players.forEach((_, pi) => {
    document.getElementById(`total_${pi}`).textContent = totals[pi];
    document.getElementById(`crown_${pi}`).textContent = totals[pi] === max && max > 0 ? '👑' : '';
  });
}

// ── Timer ──────────────────────────────────────────────
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById('timerIcon').className = 'ti ti-player-play';
    document.getElementById('timerLabel').textContent = 'Start';
  } else {
    timerRunning = true;
    document.getElementById('timerIcon').className = 'ti ti-player-pause';
    document.getElementById('timerLabel').textContent = 'Pause';
    timerInterval = setInterval(() => {
      timerSec--;
      renderTimer();
      if (timerSec <= 0) {
        clearInterval(timerInterval); timerRunning = false;
        document.getElementById('timerIcon').className = 'ti ti-player-play';
        document.getElementById('timerLabel').textContent = 'Start';
        timerSec = 60; renderTimer();
      }
    }, 1000);
  }
}
function renderTimer() {
  const d = document.getElementById('timerDisplay');
  d.textContent = Math.floor(timerSec/60) + ':' + String(timerSec%60).padStart(2,'0');
  d.classList.toggle('urgent', timerSec <= 10);
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning = false; timerSec = 60;
  document.getElementById('timerIcon').className = 'ti ti-player-play';
  document.getElementById('timerLabel').textContent = 'Start';
  document.getElementById('timerDisplay').textContent = '1:00';
  document.getElementById('timerDisplay').classList.remove('urgent');
}

// ── Spiel speichern / History ──────────────────────────
function saveGame() {
  const totals = players.map((_, pi) =>
    scores[pi].reduce((s, v) => s + (parseInt(v) || 0), 0)
  );
  if (totals.every(t => t === 0)) { alert('Noch keine Punkte eingetragen.'); return; }
  const history = loadHistory();
  const date = document.getElementById('weekLabel').value || new Date().toLocaleDateString('de-DE');
  history.unshift({ date, players: [...players], scores: totals });
  localStorage.setItem('rummikub_history', JSON.stringify(history.slice(0, 20)));
  renderHistory(); renderStats();
  alert('Spiel gespeichert!');
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('rummikub_history')) || []; } catch(e) { return []; }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const history = loadHistory();
  if (!history.length) { list.innerHTML = '<div class="empty-history">Noch keine Spiele gespeichert.</div>'; return; }
  list.innerHTML = history.map(h => {
    const max = Math.max(...h.scores);
    const rows = h.players.map((name, i) =>
      `<span class="history-score${h.scores[i]===max?' winner':''}">${name}: ${h.scores[i]}</span>`
    ).join('');
    return `<div class="history-item"><div class="history-date">${h.date}</div><div class="history-scores">${rows}</div></div>`;
  }).join('');
}

function renderStats() {
  const history = loadHistory();
  const wins = {}, totals = {}, counts = {};
  // Initialisieren mit aktuellen Spielernamen
  players.forEach(n => { wins[n] = 0; totals[n] = 0; counts[n] = 0; });
  history.forEach(h => {
    const max = Math.max(...h.scores);
    h.players.forEach((name, i) => {
      if (!wins[name]) wins[name] = 0;
      if (!totals[name]) totals[name] = 0;
      if (!counts[name]) counts[name] = 0;
      if (h.scores[i] === max) wins[name]++;
      totals[name] += h.scores[i];
      counts[name]++;
    });
  });
  const g = document.getElementById('statsGrid');
  g.innerHTML = players.map(name => `
    <div class="stat-card">
      <div class="stat-name">${name}</div>
      <div class="stat-wins">${wins[name] || 0} 🏆</div>
      <div class="stat-avg">Ø ${counts[name] ? Math.round(totals[name]/counts[name]) : 0} Pkt.</div>
    </div>`).join('');
}

// ── Reset ──────────────────────────────────────────────
function resetAll() {
  if (!confirm('Neues Spiel? Aktuelle Punkte werden gelöscht.')) return;
  scores = Array.from({length:4}, () => Array(ROUNDS).fill(''));
  resetTimer(); buildGrid();
}

// ── Namen-Overlay ──────────────────────────────────────
function openNamenOverlay() {
  const fields = document.getElementById('nameFields');
  fields.innerHTML = players.map((name, i) => `
    <div class="name-row">
      <label>Spieler ${i+1}</label>
      <input id="nameInput_${i}" type="text" value="${name}" maxlength="12" placeholder="${DEFAULT_NAMES[i]}">
    </div>
  `).join('');
  document.getElementById('namenOverlay').classList.add('open');
  document.getElementById('nameInput_0').focus();
}

function closeNamenOverlay() {
  document.getElementById('namenOverlay').classList.remove('open');
}

function closeOverlayIfBg(e) {
  if (e.target === document.getElementById('namenOverlay')) closeNamenOverlay();
}

function saveNames() {
  const newNames = players.map((_, i) => {
    const val = document.getElementById(`nameInput_${i}`).value.trim();
    return val || DEFAULT_NAMES[i];
  });
  players = newNames;
  saveNamesToStorage(players);
  closeNamenOverlay();
  buildGrid();
  renderStats();
}

// ── Init ──────────────────────────────────────────────
document.getElementById('weekLabel').value = new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
buildGrid(); renderStats(); renderHistory();
</script>
</body>
</html>
